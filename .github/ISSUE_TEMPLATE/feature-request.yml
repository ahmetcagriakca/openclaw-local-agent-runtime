name: Feature Request
description: Suggest a new feature
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      placeholder: "What do you want to add?"
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      placeholder: "Why is this needed?"
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      placeholder: "What other approaches were considered?"
