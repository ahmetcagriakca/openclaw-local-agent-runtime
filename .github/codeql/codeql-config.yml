name: "Vezir CodeQL Config"

# Security controls documentation:
#
# Path injection mitigations (all py/path-injection findings):
#   1. _SAFE_ID_RE regex validation on all user-supplied IDs
#   2. _safe_mission_path() with Path.resolve() + str.startswith(root)
#   3. _validate_and_resolve() with allowed-root whitelist in atomic_write
#   4. missions_dir is a server-controlled constant, not user input
#
# Clear text storage (js/clear-text-storage-of-sensitive-data):
#   AuthContext uses sessionStorage (not localStorage) for API keys.
#   This is intentional: keys are needed for API calls and cleared on tab close.
#   The app runs on localhost only (127.0.0.1:3000).

paths-ignore:
  - "**/*.test.tsx"
  - "**/*.test.ts"
  - "tests/"
  - "tools/"
