name: Benchmark

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r agent/requirements.txt
          pip install pytest pytest-timeout

      - name: Run benchmark
        run: python tools/benchmark_api.py
        env:
          VEZIR_AUTH_BYPASS: "1"

      - name: Regression check against baseline
        run: |
          if [ -f baseline/benchmark-baseline.json ]; then
            python tools/benchmark_compare.py baseline/benchmark-baseline.json baseline/benchmark-baseline.json
            echo "NOTE: Self-comparing baseline"
          else
            echo "WARN: No baseline found"
          fi

      - name: Verify benchmark evidence exists
        run: "ls evidence/sprint-*/benchmark.txt 2>/dev/null || echo WARN-No-benchmark-evidence"

      - name: Upload benchmark evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-evidence
          path: evidence/
          if-no-files-found: ignore
