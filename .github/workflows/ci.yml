name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  backend:
    runs-on: ubuntu-latest
    outputs:
      test_count: ${{ steps.pytest.outputs.test_count }}
      coverage: ${{ steps.pytest.outputs.coverage }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r agent/requirements.txt
          pip install pytest pytest-timeout pytest-cov ruff cryptography

      - name: Ruff lint
        run: cd agent && python -m ruff check .

      - name: Pytest
        id: pytest
        run: |
          cd agent && python -m pytest tests/ -v --timeout=30 --cov=. --cov-report=xml --cov-report=term 2>&1 | tee pytest-output.txt
          # Extract test count
          TESTS=$(grep -oP '\d+ passed' pytest-output.txt | head -1 | grep -oP '\d+')
          echo "test_count=$TESTS" >> $GITHUB_OUTPUT
          # Extract coverage percentage
          COV=$(grep -oP 'TOTAL\s+\d+\s+\d+\s+(\d+)%' pytest-output.txt | grep -oP '\d+%' | head -1 | tr -d '%')
          echo "coverage=$COV" >> $GITHUB_OUTPUT
        env:
          VEZIR_AUTH_BYPASS: "1"

  frontend:
    runs-on: ubuntu-latest
    outputs:
      test_count: ${{ steps.vitest.outputs.test_count }}
      coverage: ${{ steps.vitest.outputs.coverage }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit

      - name: Vitest with coverage
        id: vitest
        run: |
          cd frontend && npx vitest run --coverage 2>&1 | tee vitest-output.txt
          # Extract test count
          TESTS=$(grep -oP '\d+ passed' vitest-output.txt | head -1 | grep -oP '\d+')
          echo "test_count=$TESTS" >> $GITHUB_OUTPUT
          # Extract coverage from coverage summary
          COV=$(grep -oP 'All files\s*\|\s*[\d.]+' vitest-output.txt | grep -oP '[\d.]+$' | head -1)
          echo "coverage=$COV" >> $GITHUB_OUTPUT

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/

  sdk-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r agent/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Regenerate OpenAPI spec
        run: python tools/export_openapi.py

      - name: Regenerate TypeScript types
        run: cd frontend && npm run generate:api

      - name: Check for SDK drift
        run: |
          if ! git diff --exit-code docs/api/openapi.json frontend/src/api/generated.ts; then
            echo ""
            echo "ERROR: SDK drift detected!"
            echo "The checked-in OpenAPI spec or TypeScript types are out of date."
            echo "Run: python tools/export_openapi.py && cd frontend && npm run generate:api"
            echo "Then commit the updated files."
            exit 1
          fi
          echo "PASS: No SDK drift detected."

  e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r agent/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install @playwright/test
          npx playwright install --with-deps chromium

      - name: Create required directories
        run: |
          mkdir -p agent/logs agent/missions agent/approvals
          echo '{"autoGenerated":true,"capabilities":{}}' > agent/capabilities.json
          echo '[]' > agent/services.json
          touch agent/telemetry.jsonl

      - name: Start Vezir API
        run: |
          cd agent && VEZIR_AUTH_BYPASS=1 python -m uvicorn api.server:app --host 127.0.0.1 --port 8003 2>&1 &
          echo "Waiting for API to start..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8003/api/v1/health > /dev/null 2>&1; then
              echo "API ready after ${i}s"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "ERROR: API failed to start after 30s"
              exit 1
            fi
            sleep 1
          done

      - name: Run Playwright smoke tests
        run: npx playwright test --reporter=list

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results
          path: test-results/

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t vezir-api:ci .

      - name: Start container
        run: |
          docker run -d --name vezir-ci -p 8003:8003 -e VEZIR_AUTH_BYPASS=1 vezir-api:ci
          echo "Waiting for container to start..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8003/api/v1/health > /dev/null 2>&1; then
              echo "Container ready after ${i}s"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "ERROR: Container failed to start after 30s"
              docker logs vezir-ci
              exit 1
            fi
            sleep 1
          done

      - name: Verify health endpoint
        run: |
          HEALTH=$(curl -sf http://127.0.0.1:8003/api/v1/health)
          echo "Health response: $HEALTH"
          echo "$HEALTH" | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'status' in d, 'Missing status field'; assert d['status'] in ('ok','degraded','error'), f'Bad status: {d[\"status\"]}'"
          echo "PASS: Docker container health check passed."

      - name: Stop container
        if: always()
        run: docker stop vezir-ci 2>/dev/null; docker rm vezir-ci 2>/dev/null; true

  badges:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Generate badge JSON files
        run: |
          mkdir -p badges

          # Backend tests badge
          BE_TESTS="${{ needs.backend.outputs.test_count }}"
          BE_TESTS="${BE_TESTS:-0}"
          cat > badges/backend-tests.json << ENDJSON
          {"schemaVersion":1,"label":"backend tests","message":"${BE_TESTS} passed","color":"brightgreen"}
          ENDJSON

          # Frontend tests badge
          FE_TESTS="${{ needs.frontend.outputs.test_count }}"
          FE_TESTS="${FE_TESTS:-0}"
          cat > badges/frontend-tests.json << ENDJSON
          {"schemaVersion":1,"label":"frontend tests","message":"${FE_TESTS} passed","color":"brightgreen"}
          ENDJSON

          # Backend coverage badge
          BE_COV="${{ needs.backend.outputs.coverage }}"
          BE_COV="${BE_COV:-0}"
          if [ "$BE_COV" -ge 80 ] 2>/dev/null; then COV_COLOR="brightgreen"
          elif [ "$BE_COV" -ge 60 ] 2>/dev/null; then COV_COLOR="yellow"
          else COV_COLOR="red"; fi
          cat > badges/backend-coverage.json << ENDJSON
          {"schemaVersion":1,"label":"backend coverage","message":"${BE_COV}%","color":"${COV_COLOR}"}
          ENDJSON

          # Frontend coverage badge
          FE_COV="${{ needs.frontend.outputs.coverage }}"
          FE_COV="${FE_COV:-0}"
          FE_COV_INT=$(echo "$FE_COV" | cut -d. -f1)
          if [ "$FE_COV_INT" -ge 80 ] 2>/dev/null; then FE_COV_COLOR="brightgreen"
          elif [ "$FE_COV_INT" -ge 60 ] 2>/dev/null; then FE_COV_COLOR="yellow"
          else FE_COV_COLOR="red"; fi
          cat > badges/frontend-coverage.json << ENDJSON
          {"schemaVersion":1,"label":"frontend coverage","message":"${FE_COV}%","color":"${FE_COV_COLOR}"}
          ENDJSON

          # Decisions badge (from DECISIONS.md)
          DECISIONS=$(grep -c '^### D-' docs/ai/DECISIONS.md 2>/dev/null || echo "0")
          cat > badges/decisions.json << ENDJSON
          {"schemaVersion":1,"label":"decisions","message":"${DECISIONS} frozen","color":"blueviolet"}
          ENDJSON

          # Phase badge (from STATE.md)
          PHASE=$(grep -oP 'Phase \K\d+' docs/ai/STATE.md | head -1)
          PHASE="${PHASE:-?}"
          cat > badges/phase.json << ENDJSON
          {"schemaVersion":1,"label":"phase","message":"${PHASE}","color":"blue"}
          ENDJSON

          echo "Badge JSONs generated:"
          cat badges/*.json

      - name: Push badges to badges branch
        run: |
          # Save badge files to temp
          cp -r badges /tmp/badge-files

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch badges branch if it exists, or create orphan
          git fetch origin badges 2>/dev/null && git checkout badges || git checkout --orphan badges

          # Clean working tree and copy only badge files
          git rm -rf . 2>/dev/null || true
          cp /tmp/badge-files/*.json .

          git add *.json
          if git diff --cached --quiet; then
            echo "No badge changes"
          else
            git commit -m "chore(ci): update dynamic badges"
            git push origin badges --force
          fi
