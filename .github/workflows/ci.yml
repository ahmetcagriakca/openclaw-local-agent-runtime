name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          pip install -r agent/requirements.txt
          pip install pytest pytest-timeout pytest-cov ruff

      - name: Ruff lint
        run: cd agent && python -m ruff check .

      - name: Pytest
        run: cd agent && python -m pytest tests/ -v --timeout=30 --cov=. --cov-report=xml -k "not test_health_returns_ok"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit

      - name: Vitest
        run: cd frontend && npx vitest run

  e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Python dependencies
        run: pip install -r agent/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Create required directories
        run: |
          mkdir -p logs missions approvals
          echo '{"autoGenerated":true,"capabilities":{}}' > capabilities.json
          echo '[]' > services.json

      - name: Start Vezir API
        run: |
          cd agent && python -m uvicorn api.server:app --host 127.0.0.1 --port 8003 &
          echo "Waiting for API to start..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8003/api/v1/health > /dev/null 2>&1; then
              echo "API ready after ${i}s"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "ERROR: API failed to start after 30s"
              exit 1
            fi
            sleep 1
          done

      - name: Run Playwright smoke tests
        run: npx playwright test --reporter=list

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/
