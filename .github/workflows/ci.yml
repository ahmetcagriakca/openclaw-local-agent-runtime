name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          pip install -r agent/requirements.txt
          pip install pytest pytest-timeout pytest-cov ruff

      - name: Ruff lint
        run: cd agent && python -m ruff check .

      - name: Pytest
        run: cd agent && python -m pytest tests/ -v --timeout=30 --cov=. --cov-report=xml -k "not test_health_returns_ok"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit

      - name: Vitest
        run: cd frontend && npx vitest run

  sdk-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Python dependencies
        run: pip install -r agent/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Regenerate OpenAPI spec
        run: python tools/export_openapi.py

      - name: Regenerate TypeScript types
        run: cd frontend && npm run generate:api

      - name: Check for SDK drift
        run: |
          if ! git diff --exit-code docs/api/openapi.json frontend/src/api/generated.ts; then
            echo ""
            echo "ERROR: SDK drift detected!"
            echo "The checked-in OpenAPI spec or TypeScript types are out of date."
            echo "Run: python tools/export_openapi.py && cd frontend && npm run generate:api"
            echo "Then commit the updated files."
            exit 1
          fi
          echo "PASS: No SDK drift detected."

  e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Python dependencies
        run: pip install -r agent/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install @playwright/test
          npx playwright install --with-deps chromium

      - name: Create required directories
        run: |
          mkdir -p agent/logs agent/missions agent/approvals
          echo '{"autoGenerated":true,"capabilities":{}}' > agent/capabilities.json
          echo '[]' > agent/services.json
          touch agent/telemetry.jsonl

      - name: Start Vezir API
        run: |
          cd agent && python -m uvicorn api.server:app --host 127.0.0.1 --port 8003 2>&1 &
          echo "Waiting for API to start..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8003/api/v1/health > /dev/null 2>&1; then
              echo "API ready after ${i}s"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "ERROR: API failed to start after 30s"
              exit 1
            fi
            sleep 1
          done

      - name: Run Playwright smoke tests
        run: npx playwright test --reporter=list

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t vezir-api:ci .

      - name: Start container
        run: |
          docker run -d --name vezir-ci -p 8003:8003 vezir-api:ci
          echo "Waiting for container to start..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8003/api/v1/health > /dev/null 2>&1; then
              echo "Container ready after ${i}s"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "ERROR: Container failed to start after 30s"
              docker logs vezir-ci
              exit 1
            fi
            sleep 1
          done

      - name: Verify health endpoint
        run: |
          HEALTH=$(curl -sf http://127.0.0.1:8003/api/v1/health)
          echo "Health response: $HEALTH"
          echo "$HEALTH" | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'status' in d, 'Missing status field'; assert d['status'] in ('ok','degraded','error'), f'Bad status: {d[\"status\"]}'"
          echo "PASS: Docker container health check passed."

      - name: Stop container
        if: always()
        run: docker stop vezir-ci 2>/dev/null; docker rm vezir-ci 2>/dev/null; true
