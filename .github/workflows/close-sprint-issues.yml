name: Close merged sprint issues

on:
  workflow_dispatch:
    inputs:
      sprint_number:
        description: 'Sprint number (e.g., 19)'
        required: true
        type: string

permissions:
  issues: write
  contents: read

jobs:
  close-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Close merged sprint issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPRINT_NUMBER: ${{ inputs.sprint_number }}
        run: python tools/close-merged-issues.py "docs/sprints/sprint-${SPRINT_NUMBER}/"
