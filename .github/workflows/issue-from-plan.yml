name: Create Issues from plan.yaml

on:
  workflow_dispatch:
    inputs:
      sprint_number:
        description: 'Sprint number (e.g., 19)'
        required: true
        type: string

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPRINT_NUMBER: ${{ inputs.sprint_number }}
        run: |
          python3 << 'LABEL_SCRIPT'
          import os, subprocess, yaml
          sprint = os.environ["SPRINT_NUMBER"]
          plan_path = f"docs/sprints/sprint-{sprint}/plan.yaml"
          with open(plan_path) as f:
              plan = yaml.safe_load(f)
          labels = set(plan.get("issue", {}).get("labels", []))
          for t in plan.get("tasks", []):
              labels.update(t.get("labels", []))
          for label in sorted(labels):
              result = subprocess.run(["gh", "label", "create", label, "--force"], capture_output=True, text=True)
              if result.returncode == 0:
                  print(f"Label ensured: {label}")
              else:
                  print(f"Label warning: {label} — {result.stderr.strip()}")
          LABEL_SCRIPT

      - name: Create issues from plan.yaml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPRINT_NUMBER: ${{ inputs.sprint_number }}
        run: |
          python3 << 'PYTHON_SCRIPT'
          import json
          import os
          import subprocess
          import sys
          import yaml

          sprint = os.environ["SPRINT_NUMBER"]
          plan_path = f"docs/sprints/sprint-{sprint}/plan.yaml"

          # Load plan.yaml
          try:
              with open(plan_path) as f:
                  plan = yaml.safe_load(f)
          except FileNotFoundError:
              print(f"FAIL: {plan_path} not found")
              sys.exit(1)
          except yaml.YAMLError as e:
              print(f"FAIL: Invalid YAML in {plan_path}: {e}")
              sys.exit(1)

          # D-142: Validate plan.yaml structure
          required_keys = {"sprint", "phase", "title", "model", "status", "tasks"}
          missing_keys = required_keys - set(plan.keys())
          if missing_keys:
              print(f"FAIL: plan.yaml missing required keys: {sorted(missing_keys)}")
              sys.exit(1)
          if plan.get("sprint") != int(sprint):
              print(f"FAIL: plan.yaml sprint={plan.get('sprint')}, expected {sprint}")
              sys.exit(1)
          if plan.get("model") not in ("A", "B"):
              print(f"FAIL: plan.yaml model='{plan.get('model')}' invalid (expected A or B)")
              sys.exit(1)
          for t in plan.get("tasks", []):
              if not isinstance(t, dict):
                  print(f"FAIL: task is not a dict: {t}")
                  sys.exit(1)
              for key in ("id", "title", "type"):
                  if key not in t:
                      print(f"FAIL: task {t.get('id', '?')} missing required key: {key}")
                      sys.exit(1)
          print(f"plan.yaml validated: {len(plan.get('tasks', []))} tasks, model={plan.get('model')}")

          issue_config = plan.get("issue", {})
          parent_title = issue_config.get("parent_title", f"[S{sprint}] Sprint {sprint}")
          labels = issue_config.get("labels", [])
          tasks = plan.get("tasks", [])

          repo = os.environ.get("GITHUB_REPOSITORY", "")
          marker_prefix = "vezir-task"
          milestone_title = issue_config.get("milestone", f"Sprint {sprint}")

          def gh(*args):
              """Run gh CLI command and return output."""
              cmd = ["gh"] + list(args)
              result = subprocess.run(cmd, capture_output=True, text=True)
              if result.returncode != 0:
                  print(f"gh error: {result.stderr}")
              return result.stdout.strip(), result.returncode

          # D-142: Ensure milestone exists
          ms_out, ms_rc = gh("api", f"repos/{repo}/milestones",
                             "--jq", f'.[] | select(.title == "{milestone_title}") | .number')
          if ms_rc != 0 or not ms_out.strip():
              print(f"Creating milestone: {milestone_title}")
              gh("api", f"repos/{repo}/milestones", "-f", f"title={milestone_title}", "-f", "state=open")
          else:
              print(f"Milestone exists: {milestone_title} (#{ms_out.strip()})")

          def find_issue_by_marker(marker):
              """Search for existing issue by HTML comment marker."""
              search_query = f"repo:{repo} is:issue {marker} in:body"
              out, rc = gh("issue", "list", "--search", marker, "--json", "number,title,body", "--limit", "100")
              if rc != 0 or not out:
                  return None
              try:
                  issues = json.loads(out)
                  for issue in issues:
                      if marker in issue.get("body", ""):
                          return issue["number"]
              except json.JSONDecodeError:
                  pass
              return None

          def find_issue_by_title_marker(title_marker):
              """Search for existing issue by title marker."""
              out, rc = gh("issue", "list", "--search", f'"{title_marker}" in:title', "--json", "number,title", "--limit", "50")
              if rc != 0 or not out:
                  return None
              try:
                  issues = json.loads(out)
                  for issue in issues:
                      if title_marker in issue.get("title", ""):
                          return issue["number"]
              except json.JSONDecodeError:
                  pass
              return None

          # --- Create parent issue ---
          parent_marker = f"<!-- {marker_prefix}:{sprint}.parent -->"
          parent_number = find_issue_by_marker(parent_marker)

          if parent_number is None:
              parent_number = find_issue_by_title_marker(f"[S{sprint}]")

          if parent_number is None:
              label_args = []
              for l in labels:
                  label_args.extend(["--label", l])
              parent_body = f"""{parent_marker}

          # {parent_title}

          **Sprint:** {sprint}
          **Phase:** {plan.get('phase', 'N/A')}
          **Model:** {plan.get('model', 'N/A')}

          ## Tasks

          """
              for t in tasks:
                  checkbox = f"- [ ] **{t['id']}** — {t['title']} (`{t.get('type', 'N/A')}`)"
                  parent_body += checkbox + "\n"

              out, rc = gh("issue", "create",
                          "--title", parent_title,
                          "--body", parent_body,
                          "--milestone", milestone_title,
                          *label_args)
              if rc == 0:
                  # Extract issue number from URL
                  parent_number = int(out.strip().split("/")[-1])
                  print(f"Created parent issue #{parent_number}: {parent_title}")
              else:
                  print(f"FAIL: Could not create parent issue")
                  sys.exit(1)
          else:
              print(f"Parent issue already exists: #{parent_number}")

          # --- Create child issues ---
          issues_mapping = {
              "sprint": int(sprint),
              "parent_issue": parent_number,
              "tasks": {}
          }

          for task in tasks:
              task_id = task["id"]
              task_title = task["title"]
              task_type = task.get("type", "implementation")
              branch_name = task.get("branch_name")
              task_labels = task.get("labels", [])
              branch_exempt = task.get("branch_exempt", False)

              child_marker = f"<!-- {marker_prefix}:{sprint}.{task_id} -->"
              child_title = f"[S{sprint}-{task_id}] {task_title}"

              existing = find_issue_by_marker(child_marker)
              if existing is None:
                  existing = find_issue_by_title_marker(f"[S{sprint}-{task_id}]")

              if existing is not None:
                  print(f"  Task {task_id} issue already exists: #{existing}")
                  issues_mapping["tasks"][task_id] = {
                      "issue": existing,
                      "task_issue": existing,
                      "parent_issue": parent_number,
                      "branch": branch_name,
                      "branch_exempt": branch_exempt,
                      "pr": None,
                      "pr_required": not branch_exempt,
                      "allowed_pr_types": ["implementation"],
                      "task_type": task_type,
                  }
                  continue

              # Build issue body
              body_parts = [child_marker, "", f"## {task_title}", ""]
              body_parts.append(f"**Task ID:** {task_id}")
              body_parts.append(f"**Type:** {task_type}")
              body_parts.append(f"**Track:** {task.get('track', 'N/A')}")

              if branch_name:
                  body_parts.append(f"**Branch:** `{branch_name}`")
              elif branch_exempt:
                  body_parts.append("**Branch:** _exempt (gate task)_")

              depends = task.get("depends_on", [])
              if depends:
                  body_parts.append(f"**Depends on:** {', '.join(depends)}")

              co_delivered = task.get("co_delivered_with")
              if co_delivered:
                  body_parts.append(f"**Co-delivered with:** {co_delivered}")

              # D-122: Backlog issue linkage
              backlog_ref = task.get("backlog_ref")
              if backlog_ref:
                  body_parts.append(f"\n**Backlog:** Relates to #{backlog_ref}")

              child_body = "\n".join(body_parts)

              label_args = []
              all_labels = list(set(labels + task_labels))
              for l in all_labels:
                  label_args.extend(["--label", l])

              out, rc = gh("issue", "create",
                          "--title", child_title,
                          "--body", child_body,
                          "--milestone", milestone_title,
                          *label_args)

              if rc == 0:
                  issue_num = int(out.strip().split("/")[-1])
                  print(f"  Created #{issue_num}: {child_title}")
                  issues_mapping["tasks"][task_id] = {
                      "issue": issue_num,
                      "task_issue": issue_num,
                      "parent_issue": parent_number,
                      "branch": branch_name,
                      "branch_exempt": branch_exempt,
                      "pr": None,
                      "pr_required": not branch_exempt,
                      "allowed_pr_types": ["implementation"],
                      "task_type": task_type,
                  }
                  # Update issue body with closing hint (now we know the issue number)
                  if branch_name and not branch_exempt:
                      hint = f"\n\n---\n_PR closing keyword: add `Closes #{issue_num}` to your PR body from `{branch_name}` to auto-close this issue on merge._"
                      updated_body = child_body + hint
                      gh("issue", "edit", str(issue_num), "--body", updated_body)
              else:
                  print(f"  FAIL: Could not create issue for {task_id}")
                  issues_mapping["tasks"][task_id] = {
                      "issue": None,
                      "task_issue": None,
                      "parent_issue": parent_number,
                      "branch": branch_name,
                      "branch_exempt": branch_exempt,
                      "pr": None,
                      "pr_required": not branch_exempt,
                      "allowed_pr_types": ["implementation"],
                      "task_type": task_type,
                  }

          # --- Write issues.json ---
          issues_mapping["milestone"] = milestone_title
          issues_json_path = f"docs/sprints/sprint-{sprint}/issues.json"
          with open(issues_json_path, "w") as f:
              json.dump(issues_mapping, f, indent=2)
          print(f"\nWritten: {issues_json_path}")
          print(f"Tasks mapped: {len(issues_mapping['tasks'])}")
          print("DONE")
          PYTHON_SCRIPT

      - name: Commit issues.json via PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPRINT_NUMBER: ${{ inputs.sprint_number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="auto/s${SPRINT_NUMBER}-issues-json"
          git checkout -b "$BRANCH"
          git add "docs/sprints/sprint-${SPRINT_NUMBER}/issues.json"
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[S${SPRINT_NUMBER}] generate issues.json from plan.yaml"
            git push -u origin "$BRANCH"
            # Create PR and auto-merge
            PR_URL=$(gh pr create \
              --title "[S${SPRINT_NUMBER}] issues.json from plan.yaml" \
              --body "Auto-generated issues.json mapping from workflow run." \
              --base main \
              --head "$BRANCH")
            echo "Created PR: $PR_URL"
            gh pr merge "$PR_URL" --merge --admin || echo "Auto-merge not available. PR created: $PR_URL — merge manually."
          fi
