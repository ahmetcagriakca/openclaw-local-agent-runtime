name: Playwright E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: pip install -r agent/requirements.txt

      - name: Install root dependencies (Playwright)
        run: npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start API server
        run: |
          cd agent && python -m uvicorn api.server:app --host 127.0.0.1 --port 8003 --log-level warning &
          sleep 3
          curl -sf http://127.0.0.1:8003/api/v1/health || (echo "API server failed to start" && exit 1)
        env:
          VEZIR_DEV: "1"
          TESTING: "1"

      - name: Run Playwright tests
        run: npx playwright test --reporter=github
        env:
          CI: "true"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
