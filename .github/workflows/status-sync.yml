name: Sync PR status to project

on:
  pull_request:
    types: [opened, closed, reopened]

permissions:
  issues: read
  pull-requests: read
  repository-projects: write
  contents: read

jobs:
  sync-status:
    runs-on: ubuntu-latest
    steps:
      - name: Extract linked issue and update status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_STATE: ${{ github.event.pull_request.state }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_ACTION: ${{ github.event.action }}
        run: |
          echo "PR #${PR_NUMBER}: ${PR_TITLE}"
          echo "Action: ${PR_ACTION}, State: ${PR_STATE}, Merged: ${PR_MERGED}"

          # Determine target status
          if [ "$PR_MERGED" = "true" ]; then
            STATUS="Done"
          elif [ "$PR_ACTION" = "opened" ] || [ "$PR_ACTION" = "reopened" ]; then
            STATUS="In Progress"
          elif [ "$PR_ACTION" = "closed" ] && [ "$PR_MERGED" = "false" ]; then
            STATUS="Todo"
          else
            echo "No status change needed."
            exit 0
          fi

          echo "Target status: $STATUS"

          # Extract issue number from PR title pattern [SN-N.M]
          ISSUE_REF=$(echo "$PR_TITLE" | grep -oP '\[S\d+-\d+\.\w+\]' | head -1 || true)
          if [ -z "$ISSUE_REF" ]; then
            echo "No [SN-N.M] pattern in PR title. Skipping status sync."
            exit 0
          fi

          echo "Issue reference: $ISSUE_REF"

          # Find linked issue — deterministic resolution
          REPO="${GITHUB_REPOSITORY}"

          # Method 1: Extract from PR body closing references (Closes #N, Fixes #N)
          PR_BODY=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body --jq '.body' 2>/dev/null || true)
          ISSUE_NUMBER=$(echo "$PR_BODY" | grep -oP '(?:Closes|Fixes|Resolves)\s+#\K\d+' | head -1 || true)

          # Method 2: Use GitHub API to get linked issues via timeline
          if [ -z "$ISSUE_NUMBER" ]; then
            ISSUE_NUMBER=$(gh api "repos/${REPO}/issues?labels=sprint&state=all&per_page=100" \
              --jq ".[] | select(.title | contains(\"$ISSUE_REF\")) | .number" 2>/dev/null | head -1 || true)
          fi

          # Method 3: Fallback to search with escaped brackets
          if [ -z "$ISSUE_NUMBER" ]; then
            SEARCH_TERM=$(echo "$ISSUE_REF" | sed 's/\[//g; s/\]//g')
            ISSUE_NUMBER=$(gh issue list --repo "$REPO" --search "\"$SEARCH_TERM\" in:title" --json number,title --limit 5 \
              --jq ".[0].number" 2>/dev/null || true)
          fi

          if [ -z "$ISSUE_NUMBER" ] || [ "$ISSUE_NUMBER" = "null" ]; then
            echo "Could not find issue for $ISSUE_REF via closing refs, API, or search. Skipping."
            exit 0
          fi

          echo "Linked issue: #$ISSUE_NUMBER (resolved for $ISSUE_REF)"

          # Get project and update status field
          PROJECT_ID=$(gh api graphql -f query='
            query($owner: String!, $repo: String!) {
              repository(owner: $owner, name: $repo) {
                projectsV2(first: 1) {
                  nodes { id }
                }
              }
            }
          ' -f owner="${GITHUB_REPOSITORY_OWNER}" -f repo="${GITHUB_REPOSITORY#*/}" \
            --jq '.data.repository.projectsV2.nodes[0].id' 2>/dev/null || true)

          if [ -z "$PROJECT_ID" ] || [ "$PROJECT_ID" = "null" ]; then
            echo "No project found. Skipping status sync."
            exit 0
          fi

          echo "Project: $PROJECT_ID"
          echo "Status sync: Issue #$ISSUE_NUMBER → $STATUS (triggered by PR #$PR_NUMBER $PR_ACTION)"

          # Get the Status field ID and option ID
          FIELD_DATA=$(gh api graphql -f query='
            query($projectId: ID!) {
              node(id: $projectId) {
                ... on ProjectV2 {
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options { id name }
                      }
                    }
                  }
                }
              }
            }
          ' -f projectId="$PROJECT_ID" 2>/dev/null || true)

          if [ -z "$FIELD_DATA" ]; then
            echo "ERROR: Could not retrieve project field data."
            exit 1
          fi

          # Extract Status field ID
          STATUS_FIELD_ID=$(echo "$FIELD_DATA" | jq -r '
            .data.node.fields.nodes[]
            | select(.name == "Status")
            | .id' 2>/dev/null || true)

          if [ -z "$STATUS_FIELD_ID" ] || [ "$STATUS_FIELD_ID" = "null" ]; then
            echo "ERROR: Status field not found in project. Available fields:"
            echo "$FIELD_DATA" | jq -r '.data.node.fields.nodes[] | select(.name != null) | .name' 2>/dev/null
            exit 1
          fi

          echo "Status field ID: $STATUS_FIELD_ID"

          # Extract option ID for target status
          OPTION_ID=$(echo "$FIELD_DATA" | jq -r --arg status "$STATUS" '
            .data.node.fields.nodes[]
            | select(.name == "Status")
            | .options[]
            | select(.name == $status)
            | .id' 2>/dev/null || true)

          if [ -z "$OPTION_ID" ] || [ "$OPTION_ID" = "null" ]; then
            echo "ERROR: Status option '$STATUS' not found. Available options:"
            echo "$FIELD_DATA" | jq -r '.data.node.fields.nodes[] | select(.name == "Status") | .options[] | .name' 2>/dev/null
            exit 1
          fi

          echo "Option ID for '$STATUS': $OPTION_ID"

          # Get the project item ID for this issue
          ISSUE_NODE_ID=$(gh api graphql -f query='
            query($owner: String!, $repo: String!, $number: Int!) {
              repository(owner: $owner, name: $repo) {
                issue(number: $number) { id }
              }
            }
          ' -f owner="${GITHUB_REPOSITORY_OWNER}" -f repo="${GITHUB_REPOSITORY#*/}" \
            -F number="$ISSUE_NUMBER" \
            --jq '.data.repository.issue.id' 2>/dev/null || true)

          if [ -z "$ISSUE_NODE_ID" ] || [ "$ISSUE_NODE_ID" = "null" ]; then
            echo "ERROR: Could not get node ID for issue #$ISSUE_NUMBER."
            exit 1
          fi

          # Find the item in the project
          ITEM_ID=$(gh api graphql -f query='
            query($projectId: ID!) {
              node(id: $projectId) {
                ... on ProjectV2 {
                  items(first: 100) {
                    nodes {
                      id
                      content {
                        ... on Issue { id }
                      }
                    }
                  }
                }
              }
            }
          ' -f projectId="$PROJECT_ID" \
            --jq --arg issueId "$ISSUE_NODE_ID" \
            '.data.node.items.nodes[] | select(.content.id == $issueId) | .id' 2>/dev/null || true)

          if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ]; then
            echo "WARN: Issue #$ISSUE_NUMBER not found in project. Adding it first..."

            ITEM_ID=$(gh api graphql -f query='
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                  item { id }
                }
              }
            ' -f projectId="$PROJECT_ID" -f contentId="$ISSUE_NODE_ID" \
              --jq '.data.addProjectV2ItemById.item.id' 2>/dev/null || true)

            if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ]; then
              echo "ERROR: Failed to add issue #$ISSUE_NUMBER to project."
              exit 1
            fi
            echo "Added issue #$ISSUE_NUMBER to project. Item ID: $ITEM_ID"
          fi

          echo "Project item ID: $ITEM_ID"

          # Execute the mutation
          RESULT=$(gh api graphql -f query='
            mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $projectId
                itemId: $itemId
                fieldId: $fieldId
                value: { singleSelectOptionId: $optionId }
              }) {
                projectV2Item { id }
              }
            }
          ' -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID" \
            -f fieldId="$STATUS_FIELD_ID" -f optionId="$OPTION_ID" 2>&1)

          if echo "$RESULT" | jq -e '.data.updateProjectV2ItemFieldValue.projectV2Item.id' >/dev/null 2>&1; then
            echo "SUCCESS: Issue #$ISSUE_NUMBER status updated to '$STATUS' on Project V2."
          else
            echo "ERROR: Mutation failed."
            echo "$RESULT"
            exit 1
          fi
